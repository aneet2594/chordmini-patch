name: Build and Push to Docker Hub

on:
  push:
    branches: [ main ]
  workflow_dispatch:   # allow manual trigger from GitHub UI

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: aneetkaur09/chordmini-backend-fixed:latest
          # Cache layers between runs to speed up subsequent pushes
          cache-from: type=registry,ref=aneetkaur09/chordmini-backend-fixed:buildcache
          cache-to: type=registry,ref=aneetkaur09/chordmini-backend-fixed:buildcache,mode=max
